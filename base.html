<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Art Gallery{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('home') }}" class="nav-brand">🎨 Art Gallery</a>
            <ul class="nav-menu">
                <li><a href="{{ url_for('home') }}">Home</a></li>
                <li><a href="{{ url_for('artists_page') }}">Artists</a></li>
                <li><a href="{{ url_for('artworks_page') }}">Artworks</a></li>
                <li><a href="{{ url_for('reserve_page') }}">Reserve</a></li>
                {% if session.get('user_id') %}
                    <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
                    <li><a href="{{ url_for('logout') }}" class="logout-btn">Logout ({{ session.get('user_name') }})</a></li>
                {% else %}
                    <li><a href="{{ url_for('login_page') }}" class="login-btn">Login</a></li>
                {% endif %}
            </ul>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2025 Art Gallery Database Management System</p>
    </footer>
</body>
</html>
